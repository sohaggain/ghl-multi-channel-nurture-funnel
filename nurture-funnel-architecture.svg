<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="850" viewBox="0 0 1300 850" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <style>
      .trigger { fill: #EEF2FF; stroke: #4F46E5; stroke-width:2; }
      .action { fill: #ECFDF5; stroke: #059669; stroke-width:2; }
      .wait { fill: #FFF7ED; stroke: #EA580C; stroke-width:2; }
      .decision { fill: #FEF2F2; stroke: #DC2626; stroke-width:2; }
      .end { fill: #F3F4F6; stroke: #6B7280; stroke-width:2; }
      .exit { fill: #F5F3FF; stroke: #7C3AED; stroke-width:2; stroke-dasharray: 5,3; }
      .label { font-size: 12.5px; fill: #111827; font-weight: 600; }
      .sublabel { font-size: 10px; fill: #4B5563; }
      .arrow { stroke: #4B5563; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1300" height="850" fill="#FFFFFF"/>
  <text x="650" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">30-Day Multi-Channel Nurture Funnel — Architecture</text>

  <rect class="trigger" x="470" y="60" width="360" height="50" rx="10"/>
  <text class="label" x="650" y="90" text-anchor="middle">Tag Added: move-to-nurture-sequence</text>

  <path class="arrow" d="M650,110 L650,140"/>

  <!-- Day 1 -->
  <rect class="wait" x="100" y="140" width="150" height="40" rx="8"/>
  <text class="label" x="175" y="165" text-anchor="middle" font-size="11">Wait 1 Day</text>
  <rect class="action" x="270" y="140" width="180" height="40" rx="8"/>
  <text class="label" x="360" y="165" text-anchor="middle" font-size="11">Day 1: Value Email</text>

  <line class="arrow" x1="650" y1="140" x2="175" y2="140" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line class="arrow" x1="250" y1="160" x2="270" y2="160" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 3 -->
  <path class="arrow" d="M450,160 L560,160 L560,220"/>
  <rect class="wait" x="470" y="220" width="150" height="40" rx="8"/>
  <text class="label" x="545" y="245" text-anchor="middle" font-size="11">Wait to Day 3</text>
  <rect class="action" x="640" y="220" width="180" height="40" rx="8"/>
  <text class="label" x="730" y="245" text-anchor="middle" font-size="11">Day 3: Soft Check-in SMS</text>
  <line class="arrow" x1="620" y1="240" x2="640" y2="240" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <path class="arrow" d="M820,240 L900,240 L900,290"/>
  <polygon points="900,290 1000,330 900,370 800,330" class="decision"/>
  <text class="label" x="900" y="325" text-anchor="middle" font-size="11">Engaged?</text>
  <text class="sublabel" x="900" y="340" text-anchor="middle">open/click/reply</text>

  <!-- Engaged branch -->
  <line class="arrow" x1="1000" y1="330" x2="1150" y2="330" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="sublabel" x="1075" y="320" text-anchor="middle">Yes</text>
  <rect class="end" x="1050" y="355" width="220" height="55" rx="8"/>
  <text class="label" x="1160" y="378" text-anchor="middle" font-size="11">Notify Rep — Warming Up</text>
  <text class="sublabel" x="1160" y="395" text-anchor="middle">Tag: nurture-engaged</text>

  <!-- Non-engaged branch continues -->
  <line class="arrow" x1="900" y1="370" x2="900" y2="430" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="sublabel" x="950" y="410" text-anchor="middle">No</text>
  <rect class="wait" x="800" y="430" width="200" height="40" rx="8"/>
  <text class="label" x="900" y="455" text-anchor="middle" font-size="11">Wait to Day 5</text>

  <path class="arrow" d="M900,470 L900,500"/>
  <rect class="action" x="800" y="500" width="200" height="40" rx="8"/>
  <text class="label" x="900" y="525" text-anchor="middle" font-size="11">Day 5: Voicemail Drop</text>

  <path class="arrow" d="M900,540 L900,570"/>
  <rect class="action" x="650" y="570" width="500" height="55" rx="8"/>
  <text class="label" x="900" y="593" text-anchor="middle" font-size="11">Days 8, 12, 16, 20, 25 — continued Email/SMS/Voicemail mix</text>
  <text class="sublabel" x="900" y="610" text-anchor="middle">Case study, FAQ/objections, soft offer — same engagement-check pattern each time</text>

  <path class="arrow" d="M900,625 L900,655"/>
  <rect class="action" x="750" y="655" width="300" height="50" rx="8"/>
  <text class="label" x="900" y="678" text-anchor="middle" font-size="11">Day 30: "Breakup" Email</text>
  <text class="sublabel" x="900" y="694" text-anchor="middle">"Should I close your file...?"</text>

  <path class="arrow" d="M900,705 L900,735"/>
  <rect class="end" x="750" y="735" width="300" height="45" rx="8"/>
  <text class="label" x="900" y="762" text-anchor="middle" font-size="11">Tag: long-term-nurture (quarterly)</text>

  <!-- Exit triggers box -->
  <rect class="exit" x="80" y="480" width="380" height="140" rx="10"/>
  <text class="label" x="270" y="503" text-anchor="middle" fill="#7C3AED" font-size="13">Exit Triggers (run in parallel, any day)</text>
  <text class="sublabel" x="270" y="525" text-anchor="middle">Reply Detected → remove from sequence,</text>
  <text class="sublabel" x="270" y="540" text-anchor="middle">create task, tag nurture-converted-to-active</text>
  <text class="sublabel" x="270" y="562" text-anchor="middle">Booking Detected → remove from sequence,</text>
  <text class="sublabel" x="270" y="577" text-anchor="middle">tag nurture-converted-booked</text>
  <text class="sublabel" x="270" y="600" text-anchor="middle" fill="#7C3AED">Both stop all further scheduled messages instantly</text>

  <!-- Legend -->
  <rect x="80" y="800" width="16" height="16" class="trigger"/>
  <text x="102" y="813" class="sublabel">Trigger</text>
  <rect x="180" y="800" width="16" height="16" class="action"/>
  <text x="202" y="813" class="sublabel">Action</text>
  <rect x="270" y="800" width="16" height="16" class="wait"/>
  <text x="292" y="813" class="sublabel">Wait/Delay</text>
  <rect x="380" y="800" width="16" height="16" class="decision"/>
  <text x="402" y="813" class="sublabel">Decision</text>
  <rect x="470" y="800" width="16" height="16" class="end"/>
  <text x="492" y="813" class="sublabel">Outcome</text>
  <rect x="570" y="800" width="16" height="16" class="exit"/>
  <text x="592" y="813" class="sublabel">Parallel exit workflow</text>
</svg>
